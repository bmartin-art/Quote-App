<html lang="en">
<head>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 780px; margin: 0 auto; overflow: hidden; }
.header { background: #1a2f6e; color: white; padding: 24px 28px; display: flex; align-items: center; justify-content: space-between; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #f9fafb; border-radius: 10px; padding: 16px; text-align: center; border: 1.5px solid #e5e7eb; }

.cust-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }

.jobs { display: flex; flex-direction: column; gap: 14px; }
.job-card { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 16px 18px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }

.followup-section { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #e5e7eb; }

.followup-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-followup-yes { background: #10b981; color: white; border: none; border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
.btn-followup-no { background: #ef4444; color: white; border: none; border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

.followup-saved { font-size: 0.8rem; color: #6b7280; margin-top: 6px; display: none; }
.followup-card { border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.followup-card.green { background: #f0fdf4; border: 1.5px solid #10b981; }
.followup-card.red { background: #fef2f2; border: 1.5px solid #ef4444; }

.btn-dismiss:hover { background: #f3f4f6; }
.job-card.unknown { border-color: #f59e0b; background: #fffbeb; }
.job-info { flex: 1; min-width: 0; }
.job-name { font-weight: 600; font-size: 0.97rem; color: #111; }
.job-meta { font-size: 0.85rem; color: #6b7280; margin-top: 3px; }
.badge { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 5px; display: inline-block; }
.badge.won { background: #d1fae5; color: #065f46; }
.badge.lost { background: #fee2e2; color: #991b1b; }
.badge.pending { background: #e5e7eb; color: #374151; }
.badge.unknown { background: #fef3c7; color: #92400e; }
.btn-group { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.btn-won { background: #10b981; color: white; border: none; border-radius: 7px; padding: 7px 14px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
.btn-lost { background: #ef4444; color: white; border: none; border-radius: 7px; padding: 7px 14px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
.btn-unknown { background: #f59e0b; color: white; border: none; border-radius: 7px; padding: 7px 14px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.cust-header { font-size: 1.1rem; font-weight: 700; color: #111; margin-bottom: 4px; }
.cust-sub { font-size: 0.9rem; color: #6b7280; margin-bottom: 16px; }
.action-btns { display: flex; gap: 10px; margin-bottom: 20px; }
.btn-action { padding: 7px 16px; border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
textarea { width: 100%; padding: 8px; border: 1.5px solid #d1d5db; border-radius: 7px; font-size: 0.85rem; resize: vertical; min-height: 60px; font-family: inherit; margin-top: 10px; }
textarea:focus { outline: none; border-color: #1a2f6e; }
.btn-comment { margin-top: 4px; padding: 5px 12px; background: #6b7280; color: white; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
@media print {
  body { background: white; padding: 0; }
  .container { box-shadow: none; border-radius: 0; }
  .action-btns, .btn-group, textarea, .btn-comment, .brief-btn, .brief-panel { display: none; }
}
.brief-btn { position: fixed; right: 0; bottom: 80px; background: #1a2f6e; color: white; border: none; border-radius: 8px 0 0 8px; padding: 14px 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; writing-mode: vertical-rl; letter-spacing: 0.05em; z-index: 100; box-shadow: -2px 0 8px rgba(0,0,0,0.2); }
.opps-btn { position: fixed; right: 0; bottom: 220px; background: #10b981; color: white; border: none; border-radius: 8px 0 0 8px; padding: 14px 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; writing-mode: vertical-rl; letter-spacing: 0.05em; z-index: 100; box-shadow: -2px 0 8px rgba(0,0,0,0.2); }
.opps-panel { position: fixed; right: -440px; top: 0; width: 440px; height: 100vh; background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.15); z-index: 200; transition: right 0.3s ease; display: flex; flex-direction: column; }
.opps-panel.open { right: 0; }
.opps-header { background: #10b981; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.opps-header h3 { font-size: 1rem; font-weight: 600; }
.opps-close { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; line-height: 1; padding: 0; }
.opps-content { flex: 1; overflow-y: auto; padding: 20px; }
.opp-tile { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.opp-tile h4 { font-size: 0.95rem; font-weight: 600; color: #111; margin-bottom: 8px; }
.opp-tile p { font-size: 0.85rem; color: #6b7280; margin-bottom: 12px; line-height: 1.5; }
.opp-request-btn { width: 100%; padding: 9px; background: #10b981; color: white; border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
.opp-request-btn:hover { background: #059669; }
.opps-empty { text-align: center; color: #9ca3af; font-size: 0.9rem; padding: 40px 0; }
.admin-opps { margin-top: 24px; padding-top: 24px; border-top: 2px solid #e5e7eb; }
.opp-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.opp-input-row input { flex: 1; padding: 8px 12px; border: 1.5px solid #d1d5db; border-radius: 7px; font-size: 0.9rem; }
.opp-input-row input:focus { outline: none; border-color: #10b981; }
.opp-add-btn { padding: 8px 14px; background: #10b981; color: white; border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
.opp-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f9fafb; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
.opp-remove-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1rem; font-weight: 700; padding: 0 4px; }
.brief-panel { position: fixed; right: -440px; top: 0; width: 440px; height: 100vh; background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.15); z-index: 200; transition: right 0.3s ease; display: flex; flex-direction: column; }
.brief-panel.open { right: 0; }
.brief-header { background: #1a2f6e; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.brief-header h3 { font-size: 1rem; font-weight: 600; }
.brief-close { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; line-height: 1; padding: 0; }
.brief-content { flex: 1; overflow-y: auto; padding: 20px; }
.brief-issue { font-size: 0.8rem; color: #6b7280; margin-bottom: 4px; }
.brief-title { font-size: 1.3rem; font-weight: 700; color: #1a2f6e; margin-bottom: 8px; }
.brief-tagline { font-size: 0.9rem; color: #374151; margin-bottom: 16px; }
.brief-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f3f4f6; }
.brief-section h4 { font-size: 0.85rem; font-weight: 600; color: #1a2f6e; margin-bottom: 4px; }
.brief-section p { font-size: 0.85rem; color: #4b5563; line-height: 1.5; }
.brief-open-btn { display: block; width: 100%; padding: 12px; background: #1a2f6e; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Customer Quotes</h1>
      <p id="headerSub">Brookstone Industries</p>
    </div>

<button class="opps-btn" id="oppsBtn" onclick="toggleOpps()">Brookstone Opportunities</button>
<div class="opps-panel" id="oppsPanel">
  <div class="opps-header">
    <h3>Brookstone Opportunities</h3>
    <button class="opps-close" onclick="toggleOpps()">&#x2715;</button>
  </div>
  <div class="opps-content" id="oppsContent">
    <div class="opps-empty">No opportunities posted yet.</div>
  </div>
</div>

<button class="brief-btn" id="briefBtn" onclick="toggleBrief()">Brookstone Brief</button>
<div class="brief-panel" id="briefPanel">
  <div class="brief-header">
    <h3>The Brookstone Brief</h3>
    <button class="brief-close" onclick="toggleBrief()">&#x2715;</button>
  </div>
  <div class="brief-content" id="briefContent">
    <div style="color:#6b7280;font-size:0.85rem;padding:20px">Loading...</div>
  </div>
</div>
    <button class="btn-signout" id="signoutBtn" style="display:none" onclick="signOut()">Lock</button>
  </div>
  <div class="body" id="mainBody">
    <div id="status" class="msg info">Loading...</div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
var CLIENT_ID = '02bde808-c0cd-47bc-90e7-98a844b5ed86';
var APP_URL = 'https://bmartin-art.github.io/Quote-App/index.html';
var WORKER_URL = 'https://brookstone-quotes.bmartin-ed3.workers.dev';

var COL_CUSTOMER = 'Brookstone Contractors';
var COL_JOB = 'Name';
var COL_AMOUNT = 'Total';
var COL_STATUS = 'Status';
var COL_COMMENT = 'Comment';
var COL_ID = 'CustomerID';
var COL_UPDATED = 'Last Updated';

// ─── MSAL (admin only) ────────────────────────────────────────────────────────
var msalConfig = {
  auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/common', redirectUri: APP_URL }
};
var msalInstance = new msal.PublicClientApplication(msalConfig);
var scopes = ['Files.ReadWrite', 'User.Read'];

// ─── STATE ────────────────────────────────────────────────────────────────────
var fileId = null;
var allRows = [];
var headers = [];
var params = new URLSearchParams(window.location.search);
var isAdmin = params.get('admin') === 'true';
var customerId = params.get('id');

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function showStatus(msg, type) {
  var el = document.getElementById('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.textContent = msg;
  el.className = 'msg ' + (type || 'info');
}

function generateId(name) {
  var clean = name.replace(/[^a-zA-Z0-9]/g, '').substring(0, 6).toUpperCase();
  var rand = Math.random().toString(36).substring(2, 5).toUpperCase();
  return clean + rand;
}

// ─── ADMIN: Microsoft Graph API calls ────────────────────────────────────────
function getToken() {
  var accounts = msalInstance.getAllAccounts();
  if (!accounts.length) return Promise.reject(new Error('Not signed in'));
  return msalInstance.acquireTokenSilent({ scopes: scopes, account: accounts[0], forceRefresh: true })
    .then(function(r) { return r.accessToken; })
    .catch(function() {
      return msalInstance.acquireTokenSilent({ scopes: scopes, account: accounts[0] })
        .then(function(r) { return r.accessToken; });
    });
}

function apiCall(url, options) {
  options = options || {};
  return getToken().then(function(token) {
    return fetch('https://graph.microsoft.com/v1.0' + url, {
      method: options.method || 'GET',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: options.body || undefined
    });
  }).then(function(res) {
    if (!res.ok) return res.json().then(function(e) { throw new Error((e.error && e.error.message) || 'API error ' + res.status); });
    return res.json();
  });
}

var DRIVE_ID = 'b!E3d4h5FGlUadY7yqQki0Nqn63AIAb55KmC2rGrYdpsLXwRivQZNGT7Bve8fVj3FC';
var FILE_ID = '01MQSTTNUKGBEMZTQKWBBLHQDYZK5W3OCI';

function getExcelPath(id, driveId) {
  if (driveId) return '/drives/' + driveId + '/items/' + id + '/workbook/worksheets/Active/range(address=\'A1:G300\')';
  return '/me/drive/items/' + id + '/workbook/worksheets/Active/range(address=\'A1:G300\')';
}

function findAndLoadExcel() {
  // Search own drive first
  return apiCall('/me/drive/root/search(q=\'Customer%20Quotes\')?$select=id,name,parentReference')
    .then(function(search) {
      for (var i = 0; i < search.value.length; i++) {
        if (search.value[i].name.toLowerCase().indexOf('customer quotes') !== -1) {
          fileId = search.value[i].id;
          DRIVE_ID = search.value[i].parentReference ? search.value[i].parentReference.driveId : null;
          return apiCall(getExcelPath(fileId, DRIVE_ID));
        }
      }
      // Not found on own drive — search shared
      return apiCall('/me/drive/sharedWithMe?$select=id,name,remoteItem')
        .then(function(shared) {
          for (var i = 0; i < shared.value.length; i++) {
            if (shared.value[i].name && shared.value[i].name.toLowerCase().indexOf('customer quotes') !== -1) {
              var ri = shared.value[i].remoteItem || shared.value[i];
              fileId = ri.id;
              DRIVE_ID = ri.parentReference ? ri.parentReference.driveId : null;
              return apiCall(getExcelPath(fileId, DRIVE_ID));
            }
          }
          throw new Error('Customer Quotes.xlsx not found. Make sure the file has been shared with you.');
        });
    });
}

function loadExcel() {
  showStatus('Loading data...', 'info');
  return findAndLoadExcel()
    .then(function(range) {
      var values = range.values;
      if (!values || values.length < 2) throw new Error('No data found in sheet.');
      headers = values[0];
      allRows = [];
      for (var i = 1; i < values.length; i++) {
        var obj = { _row: i + 1 };
        for (var j = 0; j < headers.length; j++) obj[headers[j]] = values[i][j];
        if (obj[COL_CUSTOMER]) allRows.push(obj);
      }
    });
}

function updateCell(rowNum, colName, value) {
  var colIdx = headers.indexOf(colName);
  if (colIdx === -1) return Promise.reject(new Error('Column not found: ' + colName));
  var colLetter = String.fromCharCode(65 + colIdx);
  var apiPath = DRIVE_ID
    ? '/drives/' + DRIVE_ID + '/items/' + fileId + '/workbook/worksheets/Active/range(address=\'' + colLetter + rowNum + '\')'
    : '/me/drive/items/' + fileId + '/workbook/worksheets/Active/range(address=\'' + colLetter + rowNum + '\')';
  return apiCall(apiPath, {
    method: 'PATCH',
    body: JSON.stringify({ values: [[value]] })
  });
}

// ─── CUSTOMER: Cloudflare Worker calls (no Microsoft login needed) ─────────────
function workerGet(customerId) {
  return fetch(WORKER_URL + '/data?id=' + encodeURIComponent(customerId))
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      return data;
    });
}

function workerUpdate(rowNum, colName, value, jobName) {
  return fetch(WORKER_URL + '/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rowNum: rowNum, colName: colName, value: value, jobName: jobName || '' })
  }).then(function(res) { return res.json(); })
    .then(function(data) { if (data.error) throw new Error(data.error); return data; });
}

// ─── ADMIN INIT (uses Worker — no Microsoft login needed) ────────────────────
var ADMIN_PIN = '3340'; // Change this to your preferred PIN

function initAdmin() {
  document.getElementById('briefBtn').style.display = 'none';
  document.getElementById('oppsBtn').style.display = 'block';
  document.getElementById('headerSub').textContent = 'Admin Dashboard';
  document.getElementById('signoutBtn').style.display = 'none';

  // Check if PIN already verified this session
  if (sessionStorage.getItem('admin_verified') !== 'true') {
    var pin = prompt('Enter admin PIN:');
    if (pin !== ADMIN_PIN) {
      document.getElementById('mainBody').innerHTML = '<div class="msg error">Incorrect PIN. Please refresh and try again.</div>';
      return;
    }
    sessionStorage.setItem('admin_verified', 'true');
  }

  showStatus('Loading...', 'info');
  fetch(WORKER_URL + '/admin')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      allRows = data.rows;
      headers = data.headers;
      // Assign missing CustomerIDs via Worker
      return fetch(WORKER_URL + '/assign-ids');
    })
    .then(function(r) { return r.json(); })
    .then(function() {
      // Reload data after ID assignment
      return fetch(WORKER_URL + '/admin');
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allRows = data.rows;
      headers = data.headers;
      var customerMap = {};
      for (var i = 0; i < allRows.length; i++) {
        var name = allRows[i][COL_CUSTOMER];
        if (!customerMap[name]) customerMap[name] = allRows[i][COL_ID] || null;
      }
      renderAdminDashboard(customerMap);
    })
    .catch(function(e) { showStatus('Error: ' + e.message, 'error'); });
}

function renderSignIn() {
  document.getElementById('mainBody').innerHTML = '<div class="msg info">Please sign in with your Microsoft account.</div><button class="btn-signin" onclick="adminSignIn()">Sign in with Microsoft</button>';
}

function adminSignIn() { msalInstance.loginRedirect({ scopes: scopes }); }
function signOut() { sessionStorage.removeItem('admin_verified'); location.reload(); }

function renderAdminDashboard(customerMap) {
  showStatus('', '');
  var names = Object.keys(customerMap).sort();
  var totalWon = 0, totalLost = 0, totalUnknown = 0, totalPending = 0;
  var valueWon = 0, valueLost = 0, valueTotal = 0;
  allRows.forEach(function(r) {
    var s = String(r[COL_STATUS] || '').toLowerCase();
    var v = Number(r[COL_AMOUNT]) || 0;
    valueTotal += v;
    if (s === 'won') { totalWon++; valueWon += v; }
    else if (s === 'lost') { totalLost++; valueLost += v; }
    else if (s === 'unknown') { totalUnknown++; }
    else { totalPending++; }
  });
  var winRate = (totalWon + totalLost) > 0 ? Math.round(totalWon / (totalWon + totalLost) * 100) : 0;
  var custRows = '';
  names.forEach(function(name) {
    var id = customerMap[name];
    var jobs = allRows.filter(function(r) { return r[COL_CUSTOMER] === name; });
    var won = jobs.filter(function(r) { return String(r[COL_STATUS]).toLowerCase() === 'won'; }).length;
    var lost = jobs.filter(function(r) { return String(r[COL_STATUS]).toLowerCase() === 'lost'; }).length;
    var unk = jobs.filter(function(r) { return String(r[COL_STATUS]).toLowerCase() === 'unknown'; }).length;
    var hasComment = jobs.some(function(r) { return r[COL_COMMENT] && String(r[COL_COMMENT]).trim(); });
    var dates = jobs.map(function(r) { return r[COL_UPDATED]; }).filter(Boolean).sort().reverse();
    var lastUpdated = dates.length ? dates[0] : '';
    var link = APP_URL + '?id=' + id;
    custRows += '<tr>';
    custRows += '<td><strong>' + name + '</strong>';
    if (hasComment) custRows += ' <span style="background:#fef3c7;color:#92400e;font-size:0.7rem;font-weight:600;padding:2px 6px;border-radius:10px">Comment</span>';
    custRows += '</td>';
    custRows += '<td><span class="job-count">' + jobs.length + '</span></td>';
    custRows += '<td style="color:#065f46;font-weight:600">' + won + '</td>';
    custRows += '<td style="color:#991b1b;font-weight:600">' + lost + '</td>';
    custRows += '<td style="color:#92400e;font-weight:600">' + unk + '</td>';
    custRows += '<td style="font-size:0.8rem;color:#6b7280">' + (lastUpdated || '-') + '</td>';
    custRows += '<td><button class="copy-btn" id="btn-' + id + '" onclick="copyLink(\'' + link + '\',\'' + id + '\')">Copy Link</button></td>';
    custRows += '</tr>';
  });
  var analyticsRows = '';
  names.forEach(function(name) {
    var jobs = allRows.filter(function(r) { return r[COL_CUSTOMER] === name; });
    var won = jobs.filter(function(r) { return String(r[COL_STATUS]).toLowerCase() === 'won'; }).length;
    var lost = jobs.filter(function(r) { return String(r[COL_STATUS]).toLowerCase() === 'lost'; }).length;
    var pct = jobs.length > 0 ? Math.round(won / jobs.length * 100) : 0;
    analyticsRows += '<div class="cust-row">';
    analyticsRows += '<div class="cust-name">' + name + '</div>';
    analyticsRows += '<div class="cust-counts"><span style="color:#10b981;font-weight:600">' + won + 'W</span> / <span style="color:#ef4444;font-weight:600">' + lost + 'L</span> / ' + jobs.length + ' total</div>';
    analyticsRows += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
    analyticsRows += '<div class="bar-pct">' + pct + '%</div>';
    analyticsRows += '</div>';
  });
  var html = '';
  html += '<div class="tabs">';
  html += '<div class="tab active" id="tab-customers" onclick="switchTab(\'customers\')">Customers</div>';
  html += '<div class="tab" id="tab-analytics" onclick="switchTab(\'analytics\')">Analytics</div>';
  html += '<div class="tab" id="tab-followups" onclick="switchTab(\'followups\')">Follow Ups</div>';
  html += '</div>';
  html += '<div id="panel-customers">';
  html += '<div class="section-title">All Customers (' + names.length + ')</div>';
  html += '<input class="search-box" type="text" placeholder="Search customers..." oninput="filterTable(this.value)">';
  html += '<table class="admin-table" id="adminTable"><thead><tr>';
  html += '<th>Customer</th><th>Jobs</th><th>Won</th><th>Lost</th><th>Unknown</th><th>Last Updated</th><th>Link</th>';
  html += '</tr></thead><tbody>' + custRows + '</tbody></table>';
  html += '</div>';
  html += '<div id="panel-analytics" style="display:none">';
  html += '<div class="section-title">Overall Summary</div>';
  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-num won">' + totalWon + '</div><div class="stat-label">Won</div></div>';
  html += '<div class="stat-card"><div class="stat-num lost">' + totalLost + '</div><div class="stat-label">Lost</div></div>';
  html += '<div class="stat-card"><div class="stat-num unknown">' + totalUnknown + '</div><div class="stat-label">Unknown</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + totalPending + '</div><div class="stat-label">Pending</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + winRate + '%</div><div class="stat-label">Win Rate</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + allRows.length + '</div><div class="stat-label">Total Jobs</div></div>';
  html += '</div>';
  html += '<div class="section-title">Job Value</div>';
  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-num won">$' + valueWon.toLocaleString() + '</div><div class="stat-label">Value Won</div></div>';
  html += '<div class="stat-card"><div class="stat-num lost">$' + valueLost.toLocaleString() + '</div><div class="stat-label">Value Lost</div></div>';
  html += '<div class="stat-card"><div class="stat-num">$' + valueTotal.toLocaleString() + '</div><div class="stat-label">Total Pipeline</div></div>';
  html += '</div>';
  html += '<div class="section-title">Follow Up Stats</div>';
  html += '<div class="stat-grid" id="followup-stats"><div class="stat-card"><div class="stat-num" style="font-size:1rem;color:#6b7280">Loading...</div></div></div>';
  html += '<div class="section-title">Win Rate by Customer</div>';
  html += analyticsRows;
  html += '</div>';
  html += '<div id="panel-followups" style="display:none">';
  html += '<div class="section-title">Follow Ups</div>';
  html += '<div id="followups-loading" class="msg info">Loading follow ups...</div>';
  html += '<div id="followups-content"></div>';
  html += '</div>';
  document.getElementById('mainBody').innerHTML = html;
}

function switchTab(tab) {
  document.getElementById('panel-customers').style.display = tab === 'customers' ? 'block' : 'none';
  document.getElementById('panel-analytics').style.display = tab === 'analytics' ? 'block' : 'none';
  document.getElementById('panel-followups').style.display = tab === 'followups' ? 'block' : 'none';
  document.getElementById('tab-customers').className = 'tab' + (tab === 'customers' ? ' active' : '');
  document.getElementById('tab-analytics').className = 'tab' + (tab === 'analytics' ? ' active' : '');
  document.getElementById('tab-followups').className = 'tab' + (tab === 'followups' ? ' active' : '');
  if (tab === 'followups') loadFollowUps();
  if (tab === 'analytics') loadFollowUpStats();
}

function loadFollowUpStats() {
  fetch(WORKER_URL + '/followups')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById('followup-stats');
      if (!el) return;
      var allRows2 = data.rows || [];
      // Count all including dismissed for analytics
      fetch(WORKER_URL + '/followups?all=true')
        .then(function(r) { return r.json(); })
        .then(function(data2) {
          var rows2 = data2.rows || [];
          var green = rows2.filter(function(r) { return r.type === 'green'; }).length;
          var red = rows2.filter(function(r) { return r.type === 'red'; }).length;
          var yellow = rows2.filter(function(r) { return r.type === 'yellow'; }).length;
          el.innerHTML =
            '<div class="stat-card"><div class="stat-num won">' + green + '</div><div class="stat-label">Awarded to Brookstone</div></div>' +
            '<div class="stat-card"><div class="stat-num lost">' + red + '</div><div class="stat-label">Customer Won - Not Us</div></div>' +
            '<div class="stat-card"><div class="stat-num unknown">' + yellow + '</div><div class="stat-label">Customer Has Job - Pending</div></div>';
        }).catch(function() {
          var green = allRows2.filter(function(r) { return r.type === 'green'; }).length;
          var red = allRows2.filter(function(r) { return r.type === 'red'; }).length;
          var yellow = allRows2.filter(function(r) { return r.type === 'yellow'; }).length;
          el.innerHTML =
            '<div class="stat-card"><div class="stat-num won">' + green + '</div><div class="stat-label">Awarded to Brookstone</div></div>' +
            '<div class="stat-card"><div class="stat-num lost">' + red + '</div><div class="stat-label">Customer Won - Not Us</div></div>' +
            '<div class="stat-card"><div class="stat-num unknown">' + yellow + '</div><div class="stat-label">Customer Has Job - Pending</div></div>';
        });
    }).catch(function() {
      var el = document.getElementById('followup-stats');
      if (el) el.innerHTML = '<div class="stat-card"><div style="color:#9ca3af;font-size:0.85rem">No follow up data yet</div></div>';
    });
}

function loadFollowUps() {
  var loadingEl = document.getElementById('followups-loading');
  var contentEl = document.getElementById('followups-content');
  if (loadingEl) loadingEl.style.display = 'block';
  fetch(WORKER_URL + '/followups')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (loadingEl) loadingEl.style.display = 'none';
      if (!data.rows || data.rows.length === 0) {
        contentEl.innerHTML = '<div style="color:#9ca3af;font-size:0.9rem;padding:20px 0">No follow ups yet.</div>';
        return;
      }
      var green = data.rows.filter(function(r) { return r.type === 'green'; });
      var red = data.rows.filter(function(r) { return r.type === 'red'; });
      var yellow = data.rows.filter(function(r) { return r.type === 'yellow'; });
      var html = '';
      if (green.length) {
        html += '<div class="section-title" style="color:#065f46;margin-bottom:8px">✅ Job Awarded to Brookstone (' + green.length + ')</div>';
        green.forEach(function(r) {
          html += '<div class="followup-card green">';
          html += '<div><div class="followup-card-title green">Job Awarded to Brookstone</div>';
          html += '<div class="followup-card-details"><strong>' + r.customerName + '</strong> — ' + r.jobName + '</div>';
          html += '<div class="followup-card-date">' + r.date + '</div></div>';
          html += '<button class="btn-dismiss" onclick="dismissFollowUp(' + r.row + ', this)">Dismiss</button>';
          html += '</div>';
        });
      }
      if (red.length) {
        html += '<div class="section-title" style="color:#991b1b;margin-bottom:8px;margin-top:16px">🔴 Customer Won — Not Using Our Number (' + red.length + ')</div>';
        red.forEach(function(r) {
          html += '<div class="followup-card red">';
          html += '<div><div class="followup-card-title red">Customer awarded job — not using our number, follow up</div>';
          html += '<div class="followup-card-details"><strong>' + r.customerName + '</strong> — ' + r.jobName + '</div>';
          html += '<div class="followup-card-date">' + r.date + '</div></div>';
          html += '<button class="btn-dismiss" onclick="dismissFollowUp(' + r.row + ', this)">Dismiss</button>';
          html += '</div>';
        });
      }
      if (yellow.length) {
        html += '<div class="section-title" style="color:#92400e;margin-bottom:8px;margin-top:16px">🟡 Customer Has Job — Not Awarded Yet (' + yellow.length + ')</div>';
        yellow.forEach(function(r) {
          html += '<div class="followup-card yellow">';
          html += '<div><div class="followup-card-title yellow">Customer has job — not awarded to duct supplier yet</div>';
          html += '<div class="followup-card-details"><strong>' + r.customerName + '</strong> — ' + r.jobName + '</div>';
          html += '<div class="followup-card-date">' + r.date + '</div></div>';
          html += '<button class="btn-dismiss" onclick="dismissFollowUp(' + r.row + ', this)">Dismiss</button>';
          html += '</div>';
        });
      }
      contentEl.innerHTML = html;
    })
    .catch(function(e) {
      if (loadingEl) loadingEl.style.display = 'none';
      contentEl.innerHTML = '<div class="msg error">Error loading follow ups: ' + e.message + '</div>';
    });
}

function dismissFollowUp(row, btn) {
  btn.textContent = 'Dismissing...';
  btn.disabled = true;
  fetch(WORKER_URL + '/dismissfollowup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ row: row })
  }).then(function() {
    var card = btn.closest('.followup-card');
    card.style.opacity = '0.4';
    card.style.pointerEvents = 'none';
    setTimeout(function() { card.remove(); }, 400);
  });
}

function filterTable(query) {
  for (var i = 0; i < rows.length; i++) {
    rows[i].style.display = rows[i].cells[0].textContent.toLowerCase().indexOf(query.toLowerCase()) !== -1 ? '' : 'none';
  }
}

function copyLink(link, id) {
  navigator.clipboard.writeText(link).then(function() {
    var btn = document.getElementById('btn-' + id);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
  });
}

// ─── CUSTOMER INIT (uses Worker — no Microsoft login) ─────────────────────────
function initCustomer(id) {
  document.getElementById('headerSub').textContent = 'Your Quoted Jobs';
  showStatus('Loading your quotes...', 'info');
  workerGet(id).then(function(data) {
    allRows = data.rows;
    headers = data.headers;
    if (!allRows || allRows.length === 0) {
      showStatus('No quotes found. Please contact Brookstone Industries.', 'error');
      return;
    }
    var customerName = allRows[0][COL_CUSTOMER] || 'Your Company';
    renderCustomerView(customerName, allRows);
  }).catch(function(e) {
    showStatus('Error loading quotes: ' + e.message, 'error');
  });
}

function renderCustomerView(name, jobs) {
  showStatus('', '');
  var html = '<div class="cust-header">' + name + '</div>';
  html += '<div class="cust-sub">Click Won, Lost, or Unknown to update each job.</div>';
  html += '<div class="action-btns">';
  html += '<button class="btn-action" style="background:#1a2f6e;color:white" onclick="window.print()">Print</button>';
  html += '<button class="btn-action" style="background:#6b7280;color:white" onclick="downloadCSV()">Download CSV</button>';
  html += '</div>';
  html += '<div class="jobs">';
  for (var i = 0; i < jobs.length; i++) {
    var r = jobs[i];
    var job = r[COL_JOB] || 'Unnamed Job';
    var amount = r[COL_AMOUNT];
    var status = String(r[COL_STATUS] || '').toLowerCase();
    var isWon = (status === 'won');
    var isLost = (status === 'lost');
    var isUnknown = (status === 'unknown');
    var cardClass = isWon ? 'won' : (isLost ? 'lost' : (isUnknown ? 'unknown' : ''));
    var badgeClass = isWon ? 'won' : (isLost ? 'lost' : (isUnknown ? 'unknown' : 'pending'));
    var badgeText = isWon ? 'Won' : (isLost ? 'Lost' : (isUnknown ? 'Unknown' : 'Pending'));
    var amtStr = amount ? ' - $' + Number(amount).toLocaleString() : '';
    var comment = String(r[COL_COMMENT] || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var row = r._row;
    html += '<div class="job-card ' + cardClass + '" id="card-' + row + '">';
    html += '<div class="job-info">';
    html += '<div class="job-name">' + job + '</div>';
    html += '<div class="job-meta">' + amtStr + '</div>';
    html += '<span class="badge ' + badgeClass + '" id="badge-' + row + '">' + badgeText + '</span>';
    html += '<div id="saving-' + row + '" style="font-size:0.8rem;color:#6b7280;margin-top:4px;display:none">Saving...</div>';
    html += '<textarea id="comment-' + row + '" placeholder="Leave a comment...">' + comment + '</textarea>';
    html += '<button class="btn-comment" onclick="saveComment(' + row + ')">Save Comment</button>';
    html += '<span id="csaved-' + row + '" style="font-size:0.8rem;color:#10b981;margin-left:8px;display:none">Saved</span>';
    html += '<div id="cerr-' + row + '" style="font-size:0.8rem;color:#dc2626;margin-top:4px;display:none"></div>';
    html += '<div class="followup-section" id="followup-' + row + '">';
    html += '<div class="followup-label">If won, will it be a Brookstone awarded project?</div>';
    html += '<div class="followup-btns">';
    html += '<button class="btn-followup-yes" onclick="saveFollowUp(' + row + ', \'yes\', \'' + job.replace(/'/g, "\\'") + '\')">Yes</button>';
    html += '<button class="btn-followup-no" onclick="saveFollowUp(' + row + ', \'no\', \'' + job.replace(/'/g, "\\'") + '\')">No</button>';
    html += '<button class="btn-followup-unknown" onclick="saveFollowUp(' + row + ', \'unknown\', \'' + job.replace(/'/g, "\\'") + '\')">Unknown</button>';
    html += '</div>';
    html += '<div id="fsaved-' + row + '" class="followup-saved">Response saved!</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="btn-group">';
    html += '<button class="btn-won"' + (isWon ? ' disabled' : '') + ' onclick="setStatus(' + row + ',\'Won\')">Won</button>';
    html += '<button class="btn-lost"' + (isLost ? ' disabled' : '') + ' onclick="setStatus(' + row + ',\'Lost\')">Lost</button>';
    html += '<button class="btn-unknown"' + (isUnknown ? ' disabled' : '') + ' onclick="setStatus(' + row + ',\'Unknown\')">Unknown</button>';
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('mainBody').innerHTML = html;
}

function downloadCSV() {
  var rows = [['Job', 'Amount', 'Status', 'Last Updated', 'Comment']];
  allRows.forEach(function(r) {
    rows.push([r[COL_JOB] || '', r[COL_AMOUNT] ? '$' + Number(r[COL_AMOUNT]).toLocaleString() : '', r[COL_STATUS] || 'Pending', r[COL_UPDATED] || '', r[COL_COMMENT] || '']);
  });
  var csv = rows.map(function(r) { return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Quotes.csv';
  a.click();
}

// ─── STATUS / COMMENT: customer saves via Worker ──────────────────────────────
function saveFollowUp(rowNum, answer, jobName) {
  var savedEl = document.getElementById('fsaved-' + rowNum);
  var customerName = '';
  for (var i = 0; i < allRows.length; i++) {
    if (allRows[i]._row === rowNum) { customerName = allRows[i][COL_CUSTOMER] || ''; break; }
  }
  fetch(WORKER_URL + '/followup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jobName: jobName, customerName: customerName, answer: answer, rowNum: rowNum })
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      if (savedEl) { savedEl.style.display = 'block'; setTimeout(function() { savedEl.style.display = 'none'; }, 3000); }
      // If No or Yes, remove the card since it gets archived
      if (answer === 'yes' || answer === 'no') {
        var card = document.getElementById('card-' + rowNum);
        if (card) { card.style.opacity = '0.4'; setTimeout(function() { card.remove(); }, 500); }
      }
    })
    .catch(function(e) {
      if (savedEl) { savedEl.textContent = 'Error: ' + e.message; savedEl.style.display = 'block'; savedEl.style.color = '#dc2626'; }
    });
}

function saveComment(rowNum) {
  var text = document.getElementById('comment-' + rowNum).value;
  var savedEl = document.getElementById('csaved-' + rowNum);
  var errorEl = document.getElementById('cerr-' + rowNum);
  errorEl.style.display = 'none';
  workerUpdate(rowNum, COL_COMMENT, text).then(function() {
    for (var i = 0; i < allRows.length; i++) {
      if (allRows[i]._row === rowNum) { allRows[i][COL_COMMENT] = text; break; }
    }
    savedEl.style.display = 'inline';
    setTimeout(function() { savedEl.style.display = 'none'; }, 2000);
  }).catch(function(e) { errorEl.textContent = e.message; errorEl.style.display = 'block'; });
}

function setStatus(rowNum, status) {
  var card = document.getElementById('card-' + rowNum);
  var badge = document.getElementById('badge-' + rowNum);
  var saving = document.getElementById('saving-' + rowNum);
  var btns = card.querySelectorAll('.btn-group button');
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  saving.style.display = 'block';
  saving.textContent = 'Saving...';
  saving.style.color = '#6b7280';
  var now = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  var jobName = '';
  for (var i = 0; i < allRows.length; i++) {
    if (allRows[i]._row === rowNum) { jobName = allRows[i][COL_JOB] || ''; break; }
  }
  workerUpdate(rowNum, COL_STATUS, status, jobName).then(function() {
    return workerUpdate(rowNum, COL_UPDATED, now);
  }).then(function() {
    for (var i = 0; i < allRows.length; i++) {
      if (allRows[i]._row === rowNum) { allRows[i][COL_STATUS] = status; allRows[i][COL_UPDATED] = now; break; }
    }
    var isWon = status === 'Won';
    var isLost = status === 'Lost';
    var isUnknown = status === 'Unknown';
    card.className = 'job-card ' + status.toLowerCase();
    badge.className = 'badge ' + status.toLowerCase();
    badge.textContent = status;
    saving.style.display = 'none';
    btns[0].disabled = isWon;
    btns[1].disabled = isLost;
    btns[2].disabled = isUnknown;
    // Highlight follow-up section red as required when Won is clicked
    var followupSection = document.getElementById('followup-' + rowNum);
    if (followupSection) {
      if (isWon) {
        followupSection.style.borderColor = '#ef4444';
        followupSection.style.background = '#fef2f2';
        followupSection.style.borderRadius = '8px';
        followupSection.style.padding = '10px';
        followupSection.style.borderWidth = '2px';
        followupSection.style.borderStyle = 'solid';
        var label = followupSection.querySelector('.followup-label');
        if (label) { label.style.color = '#dc2626'; label.textContent = '⚠️ Required: If won, will it be a Brookstone awarded project?'; }
      } else {
        followupSection.style.border = '';
        followupSection.style.background = '';
        followupSection.style.padding = '';
        var label = followupSection.querySelector('.followup-label');
        if (label) { label.style.color = ''; label.textContent = 'If won, will it be a Brookstone awarded project?'; }
      }
    }
  }).catch(function(e) {
    saving.textContent = 'Save failed: ' + e.message;
    saving.style.color = '#dc2626';
    for (var i = 0; i < btns.length; i++) btns[i].disabled = false;
  });
}

function toggleBrief() {

  document.getElementById('oppsPanel').classList.remove('open');
  if (document.getElementById('briefPanel').classList.contains('open')) {
    loadBrief();

function loadBrief() {
  var content = document.getElementById('briefContent');
  if (!content || content.dataset.loaded) return;
  fetch(WORKER_URL + '/brief')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var html = '';
      html += '<div class="brief-issue">Updated ' + (data.cachedAt || '') + '</div>';
      html += '<div class="brief-title">' + (data.title || 'The Brookstone Brief') + '</div>';
      html += '<div class="brief-tagline">Monthly Market Intelligence for the Trades</div>';
      if (data.bullets && data.bullets.length) {
        html += '<div class="brief-section">';
        data.bullets.forEach(function(b) {
          html += '<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:#1a2f6e;font-weight:700;flex-shrink:0">•</span><span style="font-size:0.85rem;color:#374151;line-height:1.5">' + b + '</span></div>';
        });
        html += '</div>';
      }
      html += '<button class="brief-open-btn" onclick="window.open(\'' + data.url + '\',\'_blank\')">Read Full Newsletter</button>';
      content.innerHTML = html;
      content.dataset.loaded = '1';
    })
    .catch(function() {
      content.innerHTML = '<p style="font-size:0.85rem;color:#6b7280;margin-bottom:16px">Click below to read the latest Brookstone Brief.</p><button class="brief-open-btn" onclick="window.open(\'https://www.brookstoneind.com/brookstonebrief\',\'_blank\')">Read The Brookstone Brief</button>';
    });
}

function toggleOpps() {
  document.getElementById('oppsPanel').classList.toggle('open');
  document.getElementById('briefPanel').classList.remove('open');
  if (document.getElementById('oppsPanel').classList.contains('open') && isAdmin) {
    renderAdminOpps();
  }
}

function loadOpportunities() {
  var stored = localStorage.getItem('brookstone_opps');
  return stored ? JSON.parse(stored) : [];
}

function saveOpportunities(opps) {
  localStorage.setItem('brookstone_opps', JSON.stringify(opps));
  renderOppsPanel(opps);
}

function renderOppsPanel(opps) {
  var content = document.getElementById('oppsContent');
  if (!content) return;
  if (!opps || opps.length === 0) {
    content.innerHTML = '<div class="opps-empty">No opportunities posted yet. Check back next month!</div>';
    return;
  }
  var html = '<p style="font-size:0.85rem;color:#6b7280;margin-bottom:16px">Here are a few recent quote opportunities we are suggesting for you.</p>';
  opps.forEach(function(opp, idx) {
    html += '<div class="opp-tile">';
    html += '<h4>' + opp.name + '</h4>';
    if (opp.desc) html += '<p>' + opp.desc + '</p>';
    html += '<button class="opp-request-btn" onclick="requestPrice(' + idx + ')">Request Brookstone Price</button>';
    html += '</div>';
  });
  content.innerHTML = html;
}

function requestPrice(idx) {
  var opps = loadOpportunities();
  var opp = opps[idx];
  if (!opp) return;
  window.open('mailto:sales@brookstoneind.com?subject=Price Request: ' + encodeURIComponent(opp.name) + '&body=Hi Brookstone Team,%0A%0AI am interested in getting a price for: ' + encodeURIComponent(opp.name) + '%0A%0APlease reach out to discuss.%0A%0AThank you', '_blank');
}

function renderAdminOpps() {
  var opps = loadOpportunities();
  var listHtml = opps.length === 0 ? '<div style="color:#9ca3af;font-size:0.85rem;margin-bottom:12px">No opportunities added yet.</div>' : '';
  opps.forEach(function(opp, idx) {
    listHtml += '<div class="opp-list-item">';
    listHtml += '<div><strong>' + opp.name + '</strong>' + (opp.desc ? '<br><span style="font-size:0.8rem;color:#6b7280">' + opp.desc + '</span>' : '') + '</div>';
    listHtml += '<button class="opp-remove-btn" onclick="removeOpp(' + idx + ')">x</button>';
    listHtml += '</div>';
  });
  var content = document.getElementById('oppsContent');
  if (content) {
    content.innerHTML =
      '<p style="font-size:0.85rem;color:#6b7280;margin-bottom:12px">Add project types to show customers.</p>' +
      '<div class="opp-input-row">' +
        '<input type="text" id="oppName" placeholder="Project name">' +
        '<input type="text" id="oppDesc" placeholder="Description (optional)">' +
        '<button class="opp-add-btn" onclick="addOpp()">Add</button>' +
      '</div>' +
      listHtml;
  }
}

function addOpp() {
  var name = document.getElementById('oppName').value.trim();
  if (!name) return;
  var desc = document.getElementById('oppDesc').value.trim();
  var opps = loadOpportunities();
  opps.push({ name: name, desc: desc });
  saveOpportunities(opps);
  document.getElementById('oppName').value = '';
  document.getElementById('oppDesc').value = '';
  renderAdminOpps();
}

function removeOpp(idx) {
  var opps = loadOpportunities();
  opps.splice(idx, 1);
  saveOpportunities(opps);
  renderAdminOpps();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  renderOppsPanel(loadOpportunities());
  if (customerId) {
    // Customer view — no Microsoft login needed, goes straight to Worker
    initCustomer(customerId);
  } else if (isAdmin) {
    // Admin view — uses Worker, no Microsoft login needed
    initAdmin();
  } else {
    window.location.href = APP_URL + '?admin=true';
  }
});
</script>
</body>
</html>
